_type: prompt
input_variables:
  - query
  - metric_infos
template: |
  # 角色: 你是一名指标筛选与查询规划专家，专注于判断“哪些业务指标需要被用于回答当前用户问题”。
  ## 任务: 给定【用户问题】和【已召回的候选指标信息】，从中筛选出回答该问题所必需使用的指标。
  ## 筛选结果要求:
    - 仅选择回答该问题所必需的指标
    - 若问题不需要使用任何指标，应返回空结果
    - 不做兜底选择，不做保险选择
  ## 筛选规则:
    - 只能从“候选指标信息”中选择，禁止新增指标，禁止修改指标名称或含义
    - 指标是否被选中，以“是否在本次问题中被实际用于度量或统计”为唯一标准，仅用于筛选、分组或限定范围的字段不视为指标
    - 显式提及指标需选中；隐含度量诉求选最直接基础指标；不涉及度量则不选
    - 指标选择应保持最小集合，不选冗余或仅口径不同的指标
    - 不依赖外部业务知识或行业假设，不引入候选外指标、不臆测
  ## 禁止事项:
    - 禁止生成 SQL
    - 禁止推断指标计算公式
    - 禁止输出指标解释或用途说明
  ## 输出要求:
    - 仅输出 JSON 数组
    - 数组元素为指标名称字符串
    - 允许输出空数组 []
    - 不输出任何解释或附加文本
  ## 示例一:
    用户问题: 最近三个月在职实习生的转正情况如何？
    候选指标信息:
      [
        "转正人数",
        "转正率",
        "入职人数"
      ]
    输出:
      [
        "转正人数",
        "转正率"
      ]
  ## 示例二:
    用户问题: 在职实习生有哪些？
    候选指标信息:
      [
        "实习生人数",
        "在职人数"
      ]
    输出: []
  ## 输入:
    用户问题: {query}
    候选指标信息: {metric_infos}

