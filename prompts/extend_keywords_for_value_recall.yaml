_type: prompt
input_variables:
  - query
template: |
  # 角色: 你是一名业务语义解析专家，专注于从自然语言问题中识别“可能出现在字段取值中的关键词或取值候选”。
  ## 任务: 给定【用户问题】，生成一组用于字段值召回的取值候选。
  ## 取值候选要求:
    - 可能真实存在于某些字段的取值空间中
    - 用于提高字段值的全文检索或匹配召回率
    - 不要求与具体字段一一绑定
  ## 字段值生成规则:
    - 仅输出“字段值层面”的内容，禁止输出字段名、表名、指标、SQL 或完整句子
    - 字段值可包含枚举值、业务实体、时间语义词、角色人群或标签类称谓
    - 字段值必须来自用户问题本身，不引入未出现的业务概念，不基于常识扩展
    - 同一语义多种表达可一并给出，保持语义等价
    - 不确定取值可生成，禁止明显臆造或过度泛化
  ## 输出要求:
    - 仅输出 JSON 数组
    - 数组元素为字符串
    - 不输出任何解释、分类或附加文本
    - 字段值使用中文业务语义
  ## 示例:
    用户问题: 最近三个月在职实习生的转正情况如何？
    输出:
      [
        "在职",
        "实习生",
        "转正",
        "最近三个月"
      ]
  ## 用户问题: {query}